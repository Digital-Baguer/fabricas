<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUAC - Simulador de Flujo Cajero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #802EFF;
      --accent-soft: #F2E9FF;
      --bg: #FFFFFF;
      --text: #1F2430;
      --muted: #6B7280;
      --line: #E6E8EE;
      --ok: #14924C;
      --warn: #B06800;
      --err: #B42318;
      --manual: #7C3AED;
      --shadow: 0 10px 30px rgba(18, 27, 45, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito Sans", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      height: 72px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-family: "Poppins", sans-serif;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-pill {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #dac7ff;
      font-weight: 700;
      font-size: 12px;
      border-radius: 999px;
      padding: 8px 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 72px);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-family: "Poppins", sans-serif;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .panel-head p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      padding: 16px 18px 18px;
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select,
    .btn {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      font-size: 14px;
      font-family: "Nunito Sans", sans-serif;
    }

    select {
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
      color: var(--text);
    }

    .btn {
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 700;
      transition: .18s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.06); }

    .btn-outline {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: #cfd4df;
      background: #fbfbfd;
    }

    .case-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 6px;
    }

    .case-name {
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      margin: 0;
    }

    .case-desc {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .doc-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .doc-chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 9px;
      padding: 9px 10px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text);
    }

    .doc-chip.active {
      border-color: #bf98ff;
      background: var(--accent-soft);
      color: #3d0f86;
      font-weight: 700;
    }

    .simulator {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 560px;
    }

    .scenario-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .scenario-head h3 {
      margin: 0;
      font-family: "Poppins", sans-serif;
      font-size: 18px;
    }

    .scenario-head p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 7px 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-ok { color: var(--ok); background: #ecfdf3; border-color: #b7f0cd; }
    .badge-warn { color: var(--warn); background: #fff8e8; border-color: #f3d89e; }
    .badge-err { color: var(--err); background: #fff0ef; border-color: #f6c5c2; }
    .badge-manual { color: #5b21b6; background: #f4efff; border-color: #d8c5ff; }

    .stepper {
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .step-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #2a2f3a;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 150px;
      text-align: left;
      font-size: 12px;
      line-height: 1.3;
    }

    .step-btn small {
      color: var(--muted);
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }

    .step-btn.active {
      border-color: #b78dff;
      background: var(--accent-soft);
      color: #36126e;
      font-weight: 700;
    }

    .sim-body {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 14px;
      padding: 16px 18px;
    }

    .screen {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      min-height: 420px;
    }

    .screen-top {
      background: #faf7ff;
      border-bottom: 1px solid #eadbff;
      padding: 12px 14px;
    }

    .screen-title {
      margin: 0;
      font-family: "Poppins", sans-serif;
      font-size: 15px;
    }

    .screen-sub {
      margin: 6px 0 0;
      font-size: 12px;
      color: #6245a3;
    }

    .screen-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
    }

    .field span {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .screen-action {
      margin-top: 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      text-align: center;
      padding: 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .service-board {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .service-card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .service-card h4 {
      margin: 0 0 5px;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
    }

    .service-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .code {
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #eef0f5;
      background: #fafbfe;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #344054;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .sim-footer {
      border-top: 1px solid var(--line);
      padding: 12px 18px 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .foot-left {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .sim-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="../assets/logo-quac-morado.svg" alt="QUAC">
      <div>
        <h1>Prototipo de Captura - Flujo Cajero</h1>
        <div class="subtitle">Simulador funcional para validación de requerimientos</div>
      </div>
    </div>
    <span class="status-pill">DRAFT DE PRESENTACION</span>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>Escenarios de Evaluación</h2>
        <p>Selecciona un escenario, genera documentos de prueba y revisa la simulación de pantallas con sus servicios caja negra.</p>
      </div>

      <div class="controls">
        <label for="scenarioSelect">Escenario</label>
        <select id="scenarioSelect"></select>

        <button class="btn btn-primary" id="btnGenerate">Generar Caso</button>
        <button class="btn btn-outline" id="btnDocs">Regenerar Documentos</button>

        <div class="case-card">
          <h3 class="case-name" id="caseName"></h3>
          <p class="case-desc" id="caseDesc"></p>
          <p class="small" id="caseTicket"></p>
        </div>

        <label>Documentos asignados al escenario</label>
        <div class="doc-list" id="docList"></div>
      </div>
    </section>

    <section class="panel simulator">
      <div class="scenario-head">
        <div>
          <h3 id="simTitle"></h3>
          <p id="simDesc"></p>
        </div>
        <span class="badge badge-ok" id="simStatus"></span>
      </div>

      <div class="stepper" id="stepper"></div>

      <div class="sim-body">
        <article class="screen">
          <div class="screen-top">
            <h4 class="screen-title" id="screenTitle"></h4>
            <p class="screen-sub" id="screenSub"></p>
          </div>
          <div class="screen-body" id="screenFields"></div>
        </article>

        <section class="service-board">
          <article class="service-card">
            <h4 id="serviceName"></h4>
            <p id="servicePurpose"></p>
            <div class="code" id="serviceIn"></div>
            <div class="code" id="serviceOut"></div>
          </article>

          <article class="service-card">
            <h4>Salida de fase</h4>
            <p id="phaseResult"></p>
          </article>
        </section>
      </div>

      <div class="sim-footer">
        <div class="foot-left">
          <button class="btn btn-outline" id="btnPrev" style="width:auto;padding:0 14px;">Paso anterior</button>
          <button class="btn btn-outline" id="btnNext" style="width:auto;padding:0 14px;">Siguiente paso</button>
          <button class="btn btn-primary" id="btnPlay" style="width:auto;padding:0 14px;">Auto-play</button>
        </div>
        <span class="small" id="stepCounter"></span>
      </div>
    </section>
  </main>

  <script>
    const scenarios = [
      {
        id: "nuevo_viable",
        name: "A. Cliente nuevo viable (cupo express)",
        desc: "Alta por OCR, validaciones exitosas y activación por token de correo.",
        docType: "CC",
        finalState: "Cierre cupo express",
        finalTone: "ok",
        steps: [
          mkStep("F1", "Búsqueda cliente", "Captura documento", "El cajero ingresa tipo y número de documento para validar existencia.", "svc.cliente.buscar", "Consultar si el tercero existe en QuacOne.", "{ tipo_doc, documento }", "{ existe: false }", "Continúa por ruta de creación"),
          mkStep("F2", "Creación por OCR", "Datos autocompletados", "Se toman fotos del documento y se completan datos base del cliente.", "svc.ocr.documento", "Extraer datos de cédula para crear tercero.", "{ foto_frontal, foto_posterior }", "{ nombres, apellidos, doc, fecha_exp }", "Cliente creado en sistema"),
          mkStep("F3", "TyC y token celular", "Autorizaciones", "Se aceptan TyC y se valida propiedad de celular con token.", "svc.token.celular", "Enviar y validar token por SMS/WhatsApp.", "{ celular, canal }", "{ token_valido: true }", "Avanza a validaciones de riesgo"),
          mkStep("F4", "Antecedentes", "Evaluación en proceso", "La interfaz muestra estado de consulta de antecedentes.", "svc.riesgo.antecedentes", "Validar antecedentes negativos.", "{ documento }", "{ antecedentes: limpio }", "Aprobado"),
          mkStep("F5", "Preselecta", "Resultado de viabilidad", "Se consulta viabilidad del documento.", "svc.riesgo.preselecta", "Retornar viable / no viable / viable2.", "{ documento }", "{ preselecta: viable_1 }", "Aprobado"),
          mkStep("F6", "Cupo preaprobado", "Valor referencial", "Se calcula y presenta cupo preaprobado para continuar flujo.", "svc.credito.preaprobado", "Asignar cupo por reglas de riesgo.", "{ score, segmento }", "{ cupo_preaprobado: 1200000 }", "Cupo bloqueado listo para activación"),
          mkStep("F7", "Dirección", "Captura de residencia", "El cajero registra departamento, ciudad, dirección y barrio.", "svc.cliente.direccion", "Guardar datos de residencia.", "{ direccion, ciudad, barrio }", "{ guardado: true }", "Avanza a validación de identidad"),
          mkStep("F8", "Faceliveness y fotos", "Prueba de vida", "Se valida selfie y documento.", "svc.identidad.rekognition", "Validar liveness, OCR y match facial.", "{ selfie, doc_frontal, doc_posterior }", "{ score_match: 92, valido: true }", "Aprobado"),
          mkStep("F9", "UBICA", "Consistencia de contacto", "Se valida consistencia de celular y correo con históricos.", "svc.ubica.definicion", "Clasificar estado UBICA.", "{ documento }", "{ estado_ubica: ok_cel_correo }", "Ruta operativa"),
          mkStep("F10", "Token correo", "Activación final", "Se envía token al correo y se valida.", "svc.token.correo", "Validar propiedad del correo para activar cupo.", "{ correo }", "{ token_valido: true }", "CIERRE - Cupo express")
        ]
      },
      {
        id: "morosa",
        name: "B. Cliente existente con cartera morosa",
        desc: "Cliente con cupo activo bloqueado y mora. El flujo cierra sin estudio.",
        docType: "CC",
        finalState: "Cierre no exitoso",
        finalTone: "err",
        steps: [
          mkStep("F1", "Búsqueda cliente", "Validación inicial", "El cliente ya existe en QuacOne.", "svc.cliente.buscar", "Consultar tercero y estado de cupo.", "{ tipo_doc, documento }", "{ existe: true, cupo_activo: true, bloqueado: true }", "Revisar cartera"),
          mkStep("F2", "Cartera morosa", "Resultado inmediato", "La validación detecta cartera morosa.", "svc.credito.cartera", "Validar mora asociada al cupo.", "{ documento }", "{ cartera_morosa: true }", "CIERRE - No aplica por cartera morosa")
        ]
      },
      {
        id: "fosyga_no_cotiza",
        name: "C. Viable 2 + FOSYGA NO_COTIZA",
        desc: "Caso mayor de 75 años que pasa por FOSYGA y termina en rechazo.",
        docType: "CE",
        finalState: "Cierre no exitoso",
        finalTone: "warn",
        steps: [
          mkStep("F1", "Búsqueda cliente", "Cliente existente", "Se valida continuidad para estudio.", "svc.cliente.elegibilidad", "Determinar si puede iniciar estudio.", "{ documento }", "{ elegible: true }", "Avanza"),
          mkStep("F2", "TyC y token celular", "Consentimiento", "Token celular validado.", "svc.token.celular", "Enviar y validar token celular.", "{ celular }", "{ token_valido: true }", "Avanza"),
          mkStep("F3", "Antecedentes", "Sin hallazgos", "Consulta de antecedentes en verde.", "svc.riesgo.antecedentes", "Verificar alertas judiciales.", "{ documento }", "{ antecedentes: limpio }", "Avanza"),
          mkStep("F4", "Preselecta", "Viable 2", "Preselecta responde viable_2.", "svc.riesgo.preselecta", "Resolver clasificación de viabilidad.", "{ documento }", "{ preselecta: viable_2 }", "Pasa a FOSYGA"),
          mkStep("F5", "FOSYGA", "Validación de cotización", "Se consulta cotización por regla de edad y tipo de documento.", "svc.riesgo.fosyga", "Retornar COTIZANTE/NO_COTIZA.", "{ documento, tipo_doc, edad }", "{ fosyga: no_cotiza }", "CIERRE - Crédito no aprobado")
        ]
      },
      {
        id: "biometria_manual",
        name: "D. Falla biometría, entra Fábrica y aprueba",
        desc: "La validación automática falla en match facial y pasa a gestión manual.",
        docType: "CC",
        finalState: "Cierre cupo express (tras gestión manual)",
        finalTone: "manual",
        steps: [
          mkStep("F1", "Búsqueda/Registro", "Cliente listo", "Cliente queda listo para estudio.", "svc.cliente.orquestacion", "Buscar o crear tercero.", "{ documento }", "{ ready: true }", "Avanza"),
          mkStep("F2", "Validaciones base", "Riesgo inicial", "Token celular, antecedentes y preselecta en estado favorable.", "svc.riesgo.pipeline", "Ejecutar validaciones base.", "{ documento, celular }", "{ status: ok }", "Avanza"),
          mkStep("F3", "Identidad automática", "Match insuficiente", "Faceliveness se completa, pero el match con documento no supera umbral.", "svc.identidad.rekognition", "Validar biometría documental.", "{ selfie, doc_frontal }", "{ score_match: 73, valido: false }", "Pasa a Fábrica"),
          mkStep("F4", "Fábrica créditos", "Revisión manual", "Operador revisa evidencia y solicita nueva captura.", "svc.fabrica.gestion_manual", "Gestionar caso en call.", "{ expediente, evidencias }", "{ resultado: aprobado_manual }", "Regresa al flujo"),
          mkStep("F5", "UBICA", "Estado OK celular", "UBICA no valida correo, pero valida celular.", "svc.ubica.definicion", "Clasificar estado UBICA.", "{ documento }", "{ estado_ubica: ok_cel }", "Ruta operativa"),
          mkStep("F6", "Token correo", "Cierre final", "Se valida token correo y se activa cupo.", "svc.token.correo", "Validar correo de activación.", "{ correo }", "{ token_valido: true }", "CIERRE - Cupo express")
        ]
      },
      {
        id: "ubica_call",
        name: "E. UBICA no concluyente y cliente vuelve después",
        desc: "UBICA deriva a call. Cliente no finaliza token de correo.",
        docType: "CC",
        finalState: "Cierre cliente vuelve después",
        finalTone: "warn",
        steps: [
          mkStep("F1", "Ruta base", "Caso listo para UBICA", "El estudio llega a fase UBICA.", "svc.orquestador.flujo", "Posicionar solicitud en fase UBICA.", "{ solicitud_id }", "{ fase: ubica }", "Avanza"),
          mkStep("F2", "Definición UBICA", "No concluyente", "No se logra consistencia suficiente, se marca gestión manual call.", "svc.ubica.definicion", "Determinar estado UBICA.", "{ documento }", "{ estado_ubica: gestion_manual_call }", "Pasa a Fábrica"),
          mkStep("F3", "Confirmación call", "Confirmación parcial", "Fábrica confirma continuidad operativa para token de correo.", "svc.fabrica.confirmacion_ubicas", "Confirmar continuidad del caso.", "{ solicitud_id }", "{ confirmacion: true }", "Avanza a token correo"),
          mkStep("F4", "Token correo", "Cliente no digita token", "El token llega, pero el cliente no completa en tienda.", "svc.token.correo", "Enviar token para activación.", "{ correo }", "{ token_entregado: true, token_validado: false }", "CIERRE - Cliente vuelve después")
        ]
      }
    ];

    function mkStep(phase, title, screenTitle, screenDesc, serviceName, servicePurpose, input, output, result) {
      return { phase, title, screenTitle, screenDesc, serviceName, servicePurpose, input, output, result };
    }

    const badgeClass = {
      ok: "badge-ok",
      warn: "badge-warn",
      err: "badge-err",
      manual: "badge-manual"
    };

    let state = {
      scenarioId: scenarios[0].id,
      caseData: null,
      stepIndex: 0,
      autoplay: null
    };

    const el = {
      scenarioSelect: document.getElementById("scenarioSelect"),
      btnGenerate: document.getElementById("btnGenerate"),
      btnDocs: document.getElementById("btnDocs"),
      caseName: document.getElementById("caseName"),
      caseDesc: document.getElementById("caseDesc"),
      caseTicket: document.getElementById("caseTicket"),
      docList: document.getElementById("docList"),
      simTitle: document.getElementById("simTitle"),
      simDesc: document.getElementById("simDesc"),
      simStatus: document.getElementById("simStatus"),
      stepper: document.getElementById("stepper"),
      screenTitle: document.getElementById("screenTitle"),
      screenSub: document.getElementById("screenSub"),
      screenFields: document.getElementById("screenFields"),
      serviceName: document.getElementById("serviceName"),
      servicePurpose: document.getElementById("servicePurpose"),
      serviceIn: document.getElementById("serviceIn"),
      serviceOut: document.getElementById("serviceOut"),
      phaseResult: document.getElementById("phaseResult"),
      btnPrev: document.getElementById("btnPrev"),
      btnNext: document.getElementById("btnNext"),
      btnPlay: document.getElementById("btnPlay"),
      stepCounter: document.getElementById("stepCounter")
    };

    function init() {
      scenarios.forEach(s => {
        const option = document.createElement("option");
        option.value = s.id;
        option.textContent = s.name;
        el.scenarioSelect.appendChild(option);
      });

      el.scenarioSelect.addEventListener("change", () => {
        state.scenarioId = el.scenarioSelect.value;
        generateCase();
      });

      el.btnGenerate.addEventListener("click", generateCase);
      el.btnDocs.addEventListener("click", regenerateDocuments);
      el.btnPrev.addEventListener("click", () => moveStep(-1));
      el.btnNext.addEventListener("click", () => moveStep(1));
      el.btnPlay.addEventListener("click", toggleAutoplay);

      generateCase();
    }

    function getScenario() {
      return scenarios.find(s => s.id === state.scenarioId);
    }

    function makeDocNumber(docType, seed) {
      const base = String(100000000 + Math.floor(Math.random() * 899999999));
      return `${docType}-${base.slice(0, 3)}${seed}${base.slice(4)}`;
    }

    function buildDocuments(docType) {
      return [
        { role: "Titular principal", number: makeDocNumber(docType, "1") },
        { role: "Caso alterno A", number: makeDocNumber(docType, "2") },
        { role: "Caso alterno B", number: makeDocNumber(docType, "3") }
      ];
    }

    function generateCase() {
      stopAutoplay();
      const scenario = getScenario();
      const docs = buildDocuments(scenario.docType);
      state.caseData = {
        scenarioId: scenario.id,
        docs,
        selectedDoc: docs[0].number,
        ticket: `SIM-${Date.now().toString().slice(-6)}`
      };
      state.stepIndex = 0;
      renderAll();
    }

    function regenerateDocuments() {
      if (!state.caseData) return;
      const scenario = getScenario();
      state.caseData.docs = buildDocuments(scenario.docType);
      state.caseData.selectedDoc = state.caseData.docs[0].number;
      state.caseData.ticket = `SIM-${Date.now().toString().slice(-6)}`;
      state.stepIndex = 0;
      renderAll();
    }

    function renderAll() {
      const scenario = getScenario();
      const step = scenario.steps[state.stepIndex];

      el.caseName.textContent = scenario.name;
      el.caseDesc.textContent = scenario.desc;
      el.caseTicket.textContent = `Caso: ${state.caseData.ticket}`;

      renderDocuments();
      renderScenarioHeader(scenario);
      renderStepper(scenario);
      renderStep(step, scenario);
    }

    function renderDocuments() {
      el.docList.innerHTML = "";
      state.caseData.docs.forEach(doc => {
        const b = document.createElement("button");
        b.className = "doc-chip" + (doc.number === state.caseData.selectedDoc ? " active" : "");
        b.innerHTML = `<span>${doc.role}</span><strong>${doc.number}</strong>`;
        b.addEventListener("click", () => {
          state.caseData.selectedDoc = doc.number;
          renderAll();
        });
        el.docList.appendChild(b);
      });
    }

    function renderScenarioHeader(scenario) {
      el.simTitle.textContent = scenario.name;
      el.simDesc.textContent = `Documento activo: ${state.caseData.selectedDoc}`;
      el.simStatus.className = `badge ${badgeClass[scenario.finalTone]}`;
      el.simStatus.textContent = scenario.finalState;
    }

    function renderStepper(scenario) {
      el.stepper.innerHTML = "";
      scenario.steps.forEach((step, idx) => {
        const btn = document.createElement("button");
        btn.className = "step-btn" + (idx === state.stepIndex ? " active" : "");
        btn.innerHTML = `<small>${step.phase}</small>${step.title}`;
        btn.addEventListener("click", () => {
          state.stepIndex = idx;
          renderAll();
        });
        el.stepper.appendChild(btn);
      });
      el.stepCounter.textContent = `Paso ${state.stepIndex + 1} de ${scenario.steps.length}`;
    }

    function renderStep(step, scenario) {
      el.screenTitle.textContent = step.screenTitle;
      el.screenSub.textContent = `${step.phase} · ${step.title}`;
      el.screenFields.innerHTML = "";

      const fields = [
        ["Documento", state.caseData.selectedDoc],
        ["Escenario", scenario.name],
        ["Solicitud", state.caseData.ticket],
        ["Acción en pantalla", step.screenDesc]
      ];

      fields.forEach(([k, v]) => {
        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = `<span>${k}</span>${v}`;
        el.screenFields.appendChild(div);
      });

      const cta = document.createElement("div");
      cta.className = "screen-action";
      cta.textContent = "Continuar";
      el.screenFields.appendChild(cta);

      el.serviceName.textContent = `Caja negra: ${step.serviceName}`;
      el.servicePurpose.textContent = step.servicePurpose;
      el.serviceIn.textContent = `Entrada simulada\n${fill(step.input)}`;
      el.serviceOut.textContent = `Salida simulada\n${fill(step.output)}`;
      el.phaseResult.textContent = step.result;
    }

    function fill(text) {
      return text
        .replace("documento", state.caseData.selectedDoc)
        .replace("solicitud_id", state.caseData.ticket);
    }

    function moveStep(delta) {
      const scenario = getScenario();
      const next = state.stepIndex + delta;
      if (next < 0 || next >= scenario.steps.length) return;
      state.stepIndex = next;
      renderAll();
    }

    function toggleAutoplay() {
      if (state.autoplay) {
        stopAutoplay();
        return;
      }
      el.btnPlay.textContent = "Detener";
      state.autoplay = setInterval(() => {
        const scenario = getScenario();
        if (state.stepIndex >= scenario.steps.length - 1) {
          stopAutoplay();
          return;
        }
        state.stepIndex += 1;
        renderAll();
      }, 2000);
    }

    function stopAutoplay() {
      if (!state.autoplay) return;
      clearInterval(state.autoplay);
      state.autoplay = null;
      el.btnPlay.textContent = "Auto-play";
    }

    init();
  </script>
</body>
</html>
