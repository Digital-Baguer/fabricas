<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUAC — Prototipo Flujo Solicitud Crédito en Tienda Física</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #802EFF;
  --accent-light: #F3EEFF;
  --accent-hover: #6B1FE0;
  --bg: #FFFFFF;
  --bg-secondary: #F8F7FC;
  --text-primary: #1A1A2E;
  --text-secondary: #64648C;
  --text-muted: #9D9DB8;
  --border: #E8E5F0;
  --success: #22C55E;
  --success-bg: #F0FDF4;
  --error: #EF4444;
  --error-bg: #FEF2F2;
  --warning: #F59E0B;
  --warning-bg: #FFFBEB;
  --info: #3B82F6;
  --info-bg: #EFF6FF;
  --sidebar-w: 280px;
  --services-w: 300px;
  --header-h: 56px;
  --tabs-h: 40px;
  --nav-h: 52px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
}
h1,h2,h3,h4,h5 { font-family: 'Poppins', sans-serif; }

/* ─── Header ─── */
.header {
  height: var(--header-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  position: fixed; top:0; left:0; right:0;
  z-index: 100;
}
.header svg { flex-shrink:0; }
.header h1 { font-size: 15px; font-weight: 600; }
.header .badge {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  font-family: 'Poppins', sans-serif;
  letter-spacing: .5px;
}
.header-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.header-nav a {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  transition: all .15s;
  cursor: pointer;
  font-family: 'Nunito Sans', sans-serif;
}
.header-nav a:hover { color: var(--accent); background: var(--accent-light); }
.header-nav a.active { color: var(--accent); }
.header-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 12px;
  height: 34px;
  min-width: 220px;
  transition: border-color .15s;
}
.header-search:focus-within { border-color: var(--accent); }
.header-search input {
  border: none;
  background: none;
  font-size: 12px;
  color: var(--text-primary);
  font-family: 'Nunito Sans', sans-serif;
  outline: none;
  width: 100%;
}
.header-search input::placeholder { color: var(--text-muted); }
.hamburger-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-secondary);
  border-radius: 6px;
  transition: all .15s;
}
.hamburger-btn:hover { background: var(--bg-secondary); color: var(--accent); }
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-bell {
  position: relative;
  cursor: pointer;
  color: var(--text-muted);
  transition: color .15s;
}
.header-bell:hover { color: var(--accent); }
.header-bell .bell-badge {
  position: absolute;
  top: -4px; right: -4px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #E65100;
  border: 2px solid var(--bg);
}
.header-user {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  transition: background .15s;
}
.header-user:hover { background: var(--bg-secondary); }
.header-user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
}
.header-user-info { text-align: right; }
.header-user-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.header-user-role { font-size: 10px; color: var(--text-muted); }

/* ─── Tab Bar (pestañas tipo navegador) ─── */
.tab-bar {
  height: var(--tabs-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 8px;
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  z-index: 99;
  overflow-x: auto;
  gap: 2px;
}
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 8px 8px 0 0;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  transition: all .15s;
  white-space: nowrap;
  max-width: 220px;
  position: relative;
}
.tab:hover { background: var(--bg); color: var(--text-primary); }
.tab.active {
  background: var(--bg);
  color: var(--text-primary);
  border-color: var(--border);
}
.tab .tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tab .tab-close {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  margin-left: 4px;
  flex-shrink: 0;
}
.tab .tab-close:hover { background: var(--error-bg); color: var(--error); }
.tab-home {
  font-weight: 700;
  color: var(--accent);
  gap: 4px;
}
.tab-home:hover { color: var(--accent); }
.tab-home.active { color: var(--accent); }
.tab-phase {
  font-size: 10px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
}

/* ─── Views ─── */
.view {
  display: none;
  margin-top: calc(var(--header-h) + var(--tabs-h));
  min-height: calc(100vh - var(--header-h) - var(--tabs-h));
}
.view.active { display: flex; }
.view-home { flex-direction: column; }

/* ─── Mesa de estudios (Home) ─── */
.mesa-header {
  padding: 24px 32px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.mesa-header h2 { font-size: 22px; margin-bottom: 4px; }
.mesa-header .mesa-sub { font-size: 13px; color: var(--text-secondary); }
.mesa-filters {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  font-family: 'Nunito Sans', sans-serif;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.filter-btn .count {
  background: rgba(255,255,255,.2);
  padding: 0 6px;
  border-radius: 10px;
  font-size: 11px;
}
.filter-btn.active .count { background: rgba(255,255,255,.3); }
.mesa-stats {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
}
.mesa-stat { text-align: center; }
.mesa-stat .ms-value {
  font-size: 24px;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
  color: var(--accent);
}
.mesa-stat .ms-label {
  font-size: 11px;
  color: var(--text-muted);
}

/* Study cards grid */
.mesa-grid {
  padding: 24px 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  flex: 1;
}
.study-card {
  background: var(--bg);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.study-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.study-card .sc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.study-card .sc-client {
  font-size: 15px;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
}
.study-card .sc-cc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.study-card .sc-status-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .3px;
  flex-shrink: 0;
}
.study-card .sc-phase {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
}
.study-card .sc-phase-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
  flex-shrink: 0;
}
.study-card .sc-phase-name {
  font-size: 13px;
  font-weight: 600;
}
.study-card .sc-phase-detail {
  font-size: 11px;
  color: var(--text-muted);
}
.study-card .sc-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.study-card .sc-time {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.study-card .sc-actions {
  display: flex;
  gap: 6px;
}
.sc-action-btn {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  font-family: 'Nunito Sans', sans-serif;
  transition: all .15s;
}
.sc-attention {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 8px 10px;
  background: #FFF3E0;
  border: 1px solid #FFB74D;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  color: #E65100;
}
.sc-attention svg { flex-shrink: 0; }
.study-card.has-attention { border-color: #FFB74D; }
.study-card.has-attention:hover { border-color: #E65100; }
.sc-attention-dot {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #E65100;
  border: 2px solid var(--bg);
  animation: pulse 2s ease-in-out infinite;
}
.sc-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.sc-action-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.sc-action-btn.primary:hover { background: var(--accent-hover); }

/* Mini progress bar in card */
.sc-progress {
  display: flex;
  gap: 2px;
  margin-top: 8px;
}
.sc-progress-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
}
.sc-progress-dot.done { background: var(--success); }
.sc-progress-dot.current { background: var(--accent); }
.sc-progress-dot.fail { background: var(--error); }

/* New study button */
.new-study-btn {
  background: var(--bg);
  border-radius: var(--radius);
  border: 2px dashed var(--border);
  padding: 32px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  min-height: 180px;
}
.new-study-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* ─── Study View (flujo individual) ─── */
.view-study { flex-direction: row; }

/* Sidebar (escenarios) */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  overflow-y: auto;
  position: fixed;
  top: calc(var(--header-h) + var(--tabs-h));
  bottom: 0;
  left: 0;
  z-index: 50;
}
.sidebar h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.scenario-card {
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .2s;
}
.scenario-card:hover { border-color: var(--accent); background: var(--accent-light); }
.scenario-card.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 1px var(--accent); }
.scenario-card .sc-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; margin-right: 4px; flex-shrink: 0;
}
.scenario-card .sc-title { font-size: 12px; font-weight: 700; display: flex; align-items: center; }
.scenario-card .sc-meta { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
.scenario-card .sc-result {
  font-size: 10px; font-weight: 700; margin-top: 4px;
  padding: 1px 6px; border-radius: 4px; display: inline-block;
}
.sc-result.success { background: var(--success-bg); color: var(--success); }
.sc-result.error { background: var(--error-bg); color: var(--error); }
.sc-result.warning { background: var(--warning-bg); color: var(--warning); }
.sc-result.info { background: var(--info-bg); color: var(--info); }

/* Main area */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - var(--header-h) - var(--tabs-h));
}

/* Stepper */
.stepper-container {
  background: var(--bg);
  border-bottom: none;
  overflow-x: auto;
  scrollbar-width: none;
  cursor: grab;
  user-select: none;
  -webkit-overflow-scrolling: touch;
}
.stepper-container::-webkit-scrollbar { display: none; }
.stepper-container.dragging { cursor: grabbing; }
.stepper-container.dragging .step-tab { pointer-events: none; }
.stepper {
  display: flex;
  min-width: max-content;
  position: relative;
}
.step-tab {
  flex: 1;
  min-width: 0;
  padding: 12px 6px 10px;
  text-align: center;
  font-size: 11px;
  font-family: 'Nunito Sans', sans-serif;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: all .2s;
  white-space: nowrap;
  user-select: none;
}
.step-tab:hover { background: var(--bg-secondary); }
.step-tab .step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 9px; font-weight: 700; font-family: 'Poppins', sans-serif;
  background: var(--border); color: var(--text-muted);
  margin-right: 4px; vertical-align: middle;
}
.step-tab .step-text { vertical-align: middle; }
.step-tab.active {
  color: var(--accent);
  font-weight: 700;
  background: var(--accent-light);
  border-radius: 6px 6px 0 0;
}
.step-tab.active .step-num {
  background: var(--accent); color: #fff;
}
.step-tab.completed {
  color: var(--success);
}
.step-tab.completed .step-num {
  background: var(--success); color: #fff; font-size: 10px;
}
.step-tab.stopped {
  color: var(--error);
}
.step-tab.stopped .step-num {
  background: var(--error); color: #fff;
}
.step-tab.skipped {
  opacity: .45;
}
/* Progress bar below tabs */
.stepper-progress {
  height: 3px;
  background: var(--border);
  position: relative;
}
.stepper-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), var(--accent));
  transition: width .4s ease;
  border-radius: 0 2px 2px 0;
}

/* Content */
.content-area { display: flex; flex: 1; overflow: hidden; }
.mockup-panel { flex: 1; padding: 20px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
.mockup-card {
  background: var(--bg); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); width: 100%; max-width: 560px;
  padding: 28px; animation: fadeIn .3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.mockup-card h2 { font-size: 19px; margin-bottom: 4px; }
.mockup-card .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
.form-group input, .form-group select {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px;
  font-family: 'Nunito Sans', sans-serif; color: var(--text-primary); background: var(--bg);
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(128,46,255,.12); }
.form-group input::placeholder { color: var(--text-muted); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex:1; }
.checkbox-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }
.checkbox-row label { font-size: 12px; color: var(--text-secondary); cursor: pointer; }

/* Buttons */
.btn {
  padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  font-family: 'Poppins', sans-serif; cursor: pointer; border: none;
  transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
.btn-outline:hover { background: var(--accent-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-error { background: var(--error); color: #fff; }
.btn-group { display: flex; gap: 10px; margin-top: 18px; }

/* Results */
.result-box { padding: 16px; border-radius: var(--radius-sm); margin-top: 14px; }
.result-box.success { background: var(--success-bg); border: 1px solid var(--success); }
.result-box.error { background: var(--error-bg); border: 1px solid var(--error); }
.result-box.warning { background: var(--warning-bg); border: 1px solid var(--warning); }
.result-box.info { background: var(--info-bg); border: 1px solid var(--info); }
.result-box h3 { font-size: 15px; margin-bottom: 6px; }
.result-box p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

/* Loader */
.spinner {
  width: 44px; height: 44px; border: 4px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 1s linear infinite; display: inline-block;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loader-area { text-align: center; padding: 36px 16px; }
.loader-area .spinner { margin: 0 auto 14px; }
.loader-area p { font-size: 13px; color: var(--text-secondary); }

/* Photo */
.photo-capture { display: flex; gap: 14px; margin-top: 14px; }
.photo-box {
  flex: 1; aspect-ratio: 4/3; border: 2px dashed var(--border);
  border-radius: var(--radius-sm); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  color: var(--text-muted); font-size: 11px; cursor: pointer;
  transition: all .2s; background: var(--bg-secondary);
}
.photo-box:hover { border-color: var(--accent); color: var(--accent); }
.photo-box.captured { border-style: solid; border-color: var(--success); background: var(--success-bg); color: var(--success); }
.photo-box svg { width:28px; height:28px; }

/* OTP */
.otp-group { display: flex; gap: 6px; justify-content: center; margin: 16px 0; }
.otp-group input {
  width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 700;
  border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif;
}
.otp-group input:focus { outline: none; border-color: var(--accent); }

/* Data table */
.data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.data-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
.data-table td:first-child { font-weight: 600; color: var(--text-secondary); width: 40%; }

/* Services */
.services-panel { width: var(--services-w); background: var(--bg); border-left: 1px solid var(--border); padding: 16px 14px; overflow-y: auto; }
.services-panel h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
.service-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
.service-card .svc-method { font-size: 9px; font-weight: 700; font-family: 'Poppins', sans-serif; letter-spacing: .5px; display: inline-block; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; }
.svc-method.get { background: #DCFCE7; color: #16A34A; }
.svc-method.post { background: #DBEAFE; color: #2563EB; }
.service-card .svc-endpoint { font-size: 11px; font-weight: 700; word-break: break-all; }
.service-card .svc-system { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
.service-card .svc-desc { font-size: 10px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
.no-services { font-size: 12px; color: var(--text-muted); text-align: center; padding: 36px 10px; }

/* Nav */
.nav-bar {
  height: var(--nav-h); background: var(--bg); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
}
.nav-info { font-size: 11px; color: var(--text-muted); }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.tag-purple { background: var(--accent-light); color: var(--accent); }
.tag-green { background: var(--success-bg); color: var(--success); }
.tag-red { background: var(--error-bg); color: var(--error); }
.tag-yellow { background: var(--warning-bg); color: var(--warning); }

/* Success icon */
.success-icon {
  width: 72px; height: 72px; border-radius: 50%; background: var(--success-bg);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
  animation: popIn .4s ease;
}
@keyframes popIn { 0% { transform:scale(0); } 60% { transform:scale(1.2); } 100% { transform:scale(1); } }
.cupo-display { text-align: center; padding: 20px; }
.cupo-display .amount { font-size: 36px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--accent); }
.cupo-display .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* Fab card */
.fab-card { border: 2px solid var(--warning); border-radius: var(--radius); padding: 16px; background: var(--warning-bg); margin-top: 14px; }
.fab-card h3 { color: var(--warning); margin-bottom: 6px; font-size: 15px; }

/* Timeline */
.timeline-item { display: flex; gap: 10px; margin-bottom: 14px; }
.timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
.timeline-dot.pending { background: var(--border); }
.timeline-content h4 { font-size: 12px; }
.timeline-content p { font-size: 11px; color: var(--text-secondary); }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 32px; color: var(--text-muted);
}
.empty-state svg { margin-bottom: 12px; opacity: .3; }
.empty-state h3 { font-size: 16px; margin-bottom: 4px; color: var(--text-secondary); }
.empty-state p { font-size: 13px; }

/* Live loader (fase activa esperando respuesta) */
.live-loader {
  text-align: center;
  padding: 32px 16px;
  animation: fadeIn .3s ease;
}
.live-loader .spinner-lg {
  width: 56px; height: 56px;
  border: 4px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
.live-loader h3 {
  font-size: 16px;
  margin-bottom: 6px;
  color: var(--text-primary);
}
.live-loader .ll-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.live-loader .ll-timer {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: var(--accent-light);
  border-radius: 24px;
  font-size: 20px;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
  color: var(--accent);
  margin-bottom: 16px;
}
.live-loader .ll-timer svg { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
.live-loader .ll-detail {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.live-loader .ll-services {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 14px;
}
.live-loader .ll-svc-tag {
  padding: 4px 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  font-family: monospace;
  color: var(--text-secondary);
}
.live-loader .ll-actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* Sidebar toggle */
.sidebar-toggle {
  position: fixed;
  top: calc(var(--header-h) + var(--tabs-h) + 8px);
  left: calc(var(--sidebar-w) - 14px);
  z-index: 60;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: left .3s ease, transform .3s ease;
}
.sidebar-toggle:hover { background: var(--bg-secondary); }
.sidebar-toggle svg { transition: transform .3s ease; }
body.sidebar-hidden .sidebar { transform: translateX(-100%); }
body.sidebar-hidden .main { margin-left: 0; }
body.sidebar-hidden .sidebar-toggle { left: 6px; }
body.sidebar-hidden .sidebar-toggle svg { transform: rotate(180deg); }
.sidebar { transition: transform .3s ease; }
.main { transition: margin-left .3s ease; }

/* Responsive */
@media (max-width: 1200px) { .services-panel { display: none; } }

/* Tablet + mobile: hamburguesa para nav */
@media (max-width: 1100px) {
  .header h1 { display: none; }
  .header-nav { display: none; }
  .header-nav.mobile-open {
    display: flex;
    flex-direction: column;
    position: absolute;
    top: 100%;
    right: 0;
    width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 6px 0;
    z-index: 200;
    gap: 0;
  }
  .header-nav.mobile-open a {
    padding: 10px 18px;
    font-size: 13px;
    border-radius: 0;
  }
  .header-nav.mobile-open a:hover { background: var(--bg-secondary); }
  .header-nav.mobile-open a.active { background: var(--accent-light); }
  .hamburger-btn { display: flex; }
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .sidebar-toggle { display: none; }
  .main { margin-left: 0; }

  /* Header mobile — sticky en vez de fixed */
  .header {
    height: auto;
    min-height: 48px;
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 6px;
    position: sticky;
  }
  .header > svg { width: 50px; height: auto; }
  .header .badge { font-size: 8px; padding: 2px 6px; }
  /* nav ya oculto por breakpoint 1100px */
  .header-search {
    min-width: 0;
    flex: 1 1 100%;
    order: 10;
    height: 32px;
  }
  .header-search input { font-size: 12px; }
  .header-right { gap: 10px; }
  .header-user-info { display: none; }
  .header-user-avatar { width: 28px; height: 28px; font-size: 11px; }
  .header-bell svg { width: 18px; height: 18px; }

  /* Tab bar mobile — sticky en vez de fixed */
  .tab-bar {
    position: sticky;
    top: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-bar .tab { font-size: 11px; padding: 0 10px; white-space: nowrap; }

  /* Views ajuste top — sin offset fijo */
  .view { margin-top: 0; }

  /* Mesa header mobile */
  .mesa-header { padding: 16px 14px 12px; }
  .mesa-header h2 { font-size: 18px; }
  .mesa-header .mesa-sub { font-size: 11px; }
  .mesa-stats {
    gap: 12px;
    padding: 10px 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
  }
  .mesa-stat { min-width: 0; flex-shrink: 0; }
  .mesa-stat .ms-value { font-size: 18px; }
  .mesa-stat .ms-label { font-size: 9px; }
  .mesa-filters { gap: 6px; }
  .filter-btn { font-size: 11px; padding: 5px 10px; }

  /* Grid mobile */
  .mesa-grid {
    padding: 12px 14px;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .new-study-btn { min-height: 80px; padding: 16px; }
  .study-card { padding: 12px; }

  /* Study view mobile */
  .view-study { flex-direction: column; }
  .main { margin-left: 0; min-height: auto; }

  /* Stepper mobile */
  .stepper-container { position: relative; top: auto; }
  .stepper-bar {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 8px;
  }
  .step-tab { min-width: auto; padding: 0 8px; font-size: 10px; }
  .step-tab .step-label { display: none; }
  .step-tab .step-num { margin-right: 0; }

  /* Mockup mobile */
  .mockup { padding: 16px 14px; }
  .mockup h2 { font-size: 18px; }

  /* Services panel hidden mobile */
  .services-panel { display: none; }

  /* Bottom nav mobile */
  .nav-bar { padding: 10px 14px; position: relative; bottom: auto; }

  /* Doc cards mobile */
  .otp-group input { width: 36px; height: 42px; font-size: 18px; }

  /* Attention badge on cards */
  .sc-attention { font-size: 10px; padding: 6px 8px; }
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  const homeActive = activeView === 'home';
  let html = `<div class="tab tab-home ${homeActive?'active':''}" onclick="showHome()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
    Mesa de estudios
  </div>`;
  openTabs.forEach(sid => {
    const study = STUDIES.find(s => s.id === sid);
    if (!study) return;
    const sc = SCENARIOS[study.scenarioIdx];
    const st = STATUS_CONFIG[study.status];
    const isActive = activeView === sid;
    html += `<div class="tab ${isActive?'active':''}" onclick="openStudyTab('${sid}')">
      <span class="tab-dot" style="background:${st.dotColor}"></span>
      <span>${sc.nombre.split(' ')[0]} ${sc.apellido.split(' ')[0]}</span>
      <span class="tab-phase">P${study.currentStep}</span>
      <span class="tab-close" onclick="event.stopPropagation();closeTab('${sid}')">×</span>
    </div>`;
  });
  bar.innerHTML = html;
}

function showHome() {
  activeView = 'home';
  document.getElementById('view-home').classList.add('active');
  document.getElementById('view-study').classList.remove('active');
  renderTabBar();
  renderHome();
}

function openStudyTab(studyId) {
  if (!openTabs.includes(studyId)) openTabs.push(studyId);
  activeView = studyId;
  const study = STUDIES.find(s => s.id === studyId);
  currentScenario = study.scenarioIdx;
  currentStep = study.currentStep;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-study').classList.add('active');
  renderTabBar();
  renderStudyView();
}

function closeTab(studyId) {
  openTabs = openTabs.filter(t => t !== studyId);
  if (activeView === studyId) {
    if (openTabs.length > 0) openStudyTab(openTabs[openTabs.length-1]);
    else showHome();
  } else {
    renderTabBar();
  }
}

function renderStudyCard(study) {
  const sc = SCENARIOS[study.scenarioIdx];
  const st = STATUS_CONFIG[study.status];
  const stepLabel = STEP_LABELS[study.currentStep - 1];
  // Progress dots
  let dots = '';
  for (let i = 1; i <= 13; i++) {
    let cls = '';
    if (i < study.currentStep) cls = 'done';
    else if (i === study.currentStep) cls = 'current';
    if (i === sc.stopAt && sc.resultType === 'error' && study.currentStep >= sc.stopAt) cls = 'fail';
    dots += `<div class="sc-progress-dot ${cls}"></div>`;
  }

  const isPaused = study.status === 'pausado';
  const isFinished = study.status === 'rechazado' || study.status === 'aprobado';

  const attentionHTML = study.needsAttention ? `
    <div class="sc-attention">
      <svg width="16" height="16" fill="none" stroke="#E65100" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Requiere atención — ${study.attentionMsg}
    </div>` : '';

  return `
    <div class="study-card ${study.needsAttention ? 'has-attention' : ''}" onclick="openStudyTab('${study.id}')">
      ${study.needsAttention ? '<div class="sc-attention-dot"></div>' : ''}
      <div class="sc-top">
        <div>
          <div class="sc-client">${sc.nombre} ${sc.apellido}</div>
          <div class="sc-cc">CC ${fmtCC(sc.cc)} · ${study.id}</div>
        </div>
        <span class="sc-status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span>
      </div>
      <div class="sc-phase">
        <div class="sc-phase-num" style="background:${st.bg};color:${st.color}">${study.currentStep}</div>
        <div style="flex:1">
          <div class="sc-phase-name">${stepLabel}</div>
          <div class="sc-phase-detail">${sc.title}</div>
        </div>
        ${study.phaseWaiting ? `<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--accent);font-weight:600">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite"></span>
          ${study.phaseTime}
        </div>` : ''}
      </div>
      ${attentionHTML}
      <div class="sc-progress">${dots}</div>
      <div class="sc-bottom">
        <span class="sc-time">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          ${study.elapsed} · Inicio ${study.startTime}
        </span>
        <div class="sc-actions" onclick="event.stopPropagation()">
          ${!isFinished ? `<button class="sc-action-btn" onclick="togglePause('${study.id}')">${isPaused?'Reanudar':'Pausar'}</button>` : ''}
          <button class="sc-action-btn primary" onclick="openStudyTab('${study.id}')">Abrir</button>
        </div>
      </div>
    </div>
  `;
}

function setFilter(f) {
  currentFilter = f;
  renderHome();
}

function togglePause(studyId) {
  const s = STUDIES.find(s => s.id === studyId);
  if (s.status === 'pausado') s.status = 'en_proceso';
  else if (s.status === 'en_proceso') s.status = 'pausado';
  renderHome();
}

function renderStepper() {
  const sc = SCENARIOS[currentScenario];
  const stepper = document.getElementById('stepper');
  const progressBar = document.getElementById('stepper-progress');
  let html = '';
  for (let i = 1; i <= 13; i++) {
    let cls = '';
    if (i === currentStep) cls = 'active';
    else if (i < currentStep) cls = 'completed';
    else if (i > sc.stopAt) cls = 'skipped';
    if (i === sc.stopAt && currentStep >= sc.stopAt && sc.resultType === 'error') cls = 'stopped';
    if (i === sc.stopAt && currentStep >= sc.stopAt && sc.resultType === 'success') cls = 'completed';
    const num = i < currentStep ? '✓' : i;
    html += `<div class="step-tab ${cls}" onclick="goToStep(${i})">
      <span class="step-num">${num}</span><span class="step-text">${STEP_LABELS[i-1]}</span>
    </div>`;
  }
  stepper.innerHTML = html;
  if (progressBar) {
    const pct = Math.round(((currentStep - 1) / 12) * 100);
    progressBar.style.width = pct + '%';
  }
}

function renderServices() {
  const panel = document.getElementById('services-panel');
  const svcs = SERVICES[currentStep] || [];
  if (svcs.length === 0) {
    panel.innerHTML = `<h4><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Servicios / APIs</h4>

function fmtCC(cc) { return cc.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }

// RENDER MOCKUP POR PASO (misma lógica que antes)
// ════════════════════════════════════════════════════

function isStudyWaitingOnCurrentPhase() {
  if (activeView === 'home') return false;
  const study = STUDIES.find(s => s.id === activeView);
  if (!study) return false;
  // Está esperando si: el paso actual es su currentStep, está en_proceso o en_fabrica, y phaseWaiting=true
  return study.phaseWaiting && currentStep === study.currentStep &&
    (study.status === 'en_proceso' || study.status === 'en_fabrica');
}

function renderLiveLoader(sc, study) {
  const phase = LIVE_PHASES[currentStep];
  const svcs = SERVICES[currentStep] || [];
  const stepLabel = STEP_LABELS[currentStep - 1];

  // Para fábrica (paso 11) es diferente
  if (currentStep === 11) {
    return `<div class="live-loader">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--warning-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">

function resolvePhase() {
  const study = STUDIES.find(s => s.id === activeView);
  if (study) {
    study.phaseWaiting = false;
  }
  renderStudyView();
  renderTabBar();
}

function renderMockup() {
  const sc = SCENARIOS[currentScenario];
  const mockup = document.getElementById('mockup');
  if (currentStep > sc.stopAt) { currentStep = sc.stopAt; renderStepper(); }

  // Si el estudio está esperando respuesta en esta fase, mostrar live loader
  if (isStudyWaitingOnCurrentPhase()) {
    const study = STUDIES.find(s => s.id === activeView);
    mockup.innerHTML = renderLiveLoader(sc, study);
    return;
  }

  const stepData = sc.stepsData[currentStep];
  switch(currentStep) {
    case 1: mockup.innerHTML = renderStep1(sc); break;
    case 2: mockup.innerHTML = renderStep2(sc, stepData); break;
    case 3: mockup.innerHTML = renderStep3(sc); break;
    case 4: mockup.innerHTML = renderStep4(sc); break;
    case 5: mockup.innerHTML = renderStep5(sc, stepData); break;
    case 6: mockup.innerHTML = renderStep6(sc, stepData); break;
    case 7: mockup.innerHTML = renderStep7(sc, stepData); break;
    case 8: mockup.innerHTML = renderStep8(sc); break;
    case 9: mockup.innerHTML = renderStep9(sc); break;
    case 10: mockup.innerHTML = renderStep10(sc, stepData); break;
    case 11: mockup.innerHTML = renderStep11(sc, stepData); break;
    case 12: mockup.innerHTML = renderStep12(sc, stepData); break;
    case 13: mockup.innerHTML = renderStep13(sc); break;
  }
}

  step3Method = method;

  step3Phase++;

  step3Phase = 3;

    // Sub-estado 2: Fotos recibidas → mostrar tarjetas realistas + botón Procesar OCR
    return `<h2>Crear tercero — Captura de documento</h2>
    <p class="subtitle">Fotos recibidas del celular corporativo. Verifique que estén correctas y procese el OCR.</p>

    <div class="result-box success" style="margin-top:0;margin-bottom:14px">

    </div>

    <div class="btn-group"><button class="btn btn-primary" onclick="step3Advance()">Procesar OCR &#9654;</button></div>`;
  }

  // ── Sub-fase 2: Resultado extracción OCR ──
  if (step3Phase === 2) {
    return `<h2>Crear tercero — Datos extraídos</h2>
    <p class="subtitle">El OCR procesó las fotos del documento. Verifique la información extraída.</p>

      <tr><td>Número</td><td><span class="tag tag-green">Autocompletado</span> ${fmtCC(sc.cc)}</td></tr>

      <tr><td>Género</td><td><span class="tag tag-green">Autocompletado</span> Masculino</td></tr>
      <tr><td>Fecha expedición</td><td><span class="tag tag-green">Autocompletado</span> 2013-05-20</td></tr>
      <tr><td>Ciudad expedición</td><td><span class="tag tag-green">Autocompletado</span> ${sc.ciudad}</td></tr>
      <tr><td>Fecha nacimiento</td><td><span class="tag tag-green">Autocompletado</span> ${sc.nacimiento}</td></tr>
      <tr><td>Correo</td><td><span class="tag tag-yellow">Pendiente</span> <em>El cajero debe diligenciar</em></td></tr>
      <tr><td>Celular</td><td><span class="tag tag-yellow">Pendiente</span> <em>El cajero debe diligenciar</em></td></tr>
    </table>

    <div class="btn-group"><button class="btn btn-primary" onclick="step3OcrDone()">Completar datos faltantes &#9654;</button></div>`;
  }

  // ── Sub-fase 3: Formulario completo ──
  return renderStep3Form(sc, step3Method === 'ocr');
}

let validacionState = { celular: null, correo: null };

function validarDisponibilidad(tipo) {
  const el = document.getElementById(`validacion-${tipo}`);
  const inp = document.getElementById(`f3-${tipo}`) || document.getElementById(`inp-${tipo}`);
  const valor = inp ? inp.value.trim() : '';
  if (!valor) { el.innerHTML = `<span style="font-size:11px;color:var(--error)">Ingrese un ${tipo === 'celular' ? 'número de celular' : 'correo electrónico'}</span>`; return; }

  // Mostrar loader
  el.innerHTML = `<span style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
    <span class="spinner" style="width:14px;height:14px;border-width:2px"></span>
    Consultando disponibilidad del ${tipo}…
    <span style="font-size:10px;color:var(--text-muted)">(POST Cliente/ValidarContacto — QuacOne)</span>
  </span>`;

  // Simular respuesta del servicio
  setTimeout(() => {
    validacionState[tipo] = 'ok';
    el.innerHTML = `<div style="font-size:11px;display:flex;align-items:center;gap:6px;color:var(--success);padding:4px 0">
      <svg width="14" height="14" fill="none" stroke="var(--success)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      <strong>${tipo === 'celular' ? 'Celular disponible' : 'Correo disponible'}</strong>
      <span style="color:var(--text-muted);font-weight:400">— No está asociado a otro documento con cupo activo ni solicitud en curso</span>
    </div>`;
    if (inp) { inp.style.borderColor = 'var(--success)'; inp.style.background = 'var(--success-bg)'; }
    actualizarResumenValidacion();
  }, 1200);
}

function validarDisponibilidadFail(tipo, motivo) {
  // Helper para simular escenarios de fallo (no usado en el flujo feliz)
  const el = document.getElementById(`validacion-${tipo}`);
  const inp = document.getElementById(`f3-${tipo}`) || document.getElementById(`inp-${tipo}`);
  validacionState[tipo] = 'error';
  el.innerHTML = `<div style="font-size:11px;display:flex;align-items:flex-start;gap:6px;color:var(--error);padding:4px 0">
    <svg width="14" height="14" fill="none" stroke="var(--error)" stroke-width="2.5" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    <div><strong>${tipo === 'celular' ? 'Celular no disponible' : 'Correo no disponible'}</strong><br>
    <span style="color:var(--text-secondary);font-weight:400">${motivo}</span></div>
  </div>`;
  if (inp) { inp.style.borderColor = 'var(--error)'; inp.style.background = 'var(--error-bg, #fff5f5)'; }
  actualizarResumenValidacion();
}

function actualizarResumenValidacion() {
  const resumen = document.getElementById('validacion-resumen');
  if (!resumen) return;
  const ambosOk = validacionState.celular === 'ok' && validacionState.correo === 'ok';
  const hayError = validacionState.celular === 'error' || validacionState.correo === 'error';

  if (ambosOk) {
    resumen.style.display = 'block';
    resumen.style.background = 'var(--success-bg)';
    resumen.style.border = '1px solid var(--success)';
    resumen.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" fill="none" stroke="var(--success)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      <div><strong style="color:var(--success)">Celular y correo validados correctamente.</strong>
      <span style="color:var(--text-secondary)">Ambos están disponibles para asociar a este documento.</span></div>
    </div>
    <div style="margin-top:6px;font-size:10px;color:var(--text-muted);font-family:monospace">Servicio: POST Cliente/ValidarContacto → { disponible: true, asociadoA: null }</div>`;
  } else if (hayError) {
    resumen.style.display = 'block';
    resumen.style.background = 'var(--error-bg, #fff5f5)';
    resumen.style.border = '1px solid var(--error)';
    resumen.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" fill="none" stroke="var(--error)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <div><strong style="color:var(--error)">No se puede continuar.</strong>
      <span style="color:var(--text-secondary)">Corrija los datos de contacto marcados en rojo antes de iniciar el estudio.</span></div>
    </div>`;
  } else {
    resumen.style.display = 'none';
  }
}

function validarAsesor() {
  const codeEl = document.getElementById('asesor-code');
  const nameEl = document.getElementById('asesor-name');
  const valEl = document.getElementById('asesor-validation');
  const code = codeEl ? codeEl.value.trim().toUpperCase() : '';

  if (!code) {
    asesorValidado = true;
    if (valEl) valEl.innerHTML = `<span style="font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
      <svg width="12" height="12" fill="none" stroke="var(--text-muted)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>

    if (nameEl) { nameEl.value = ''; nameEl.style.borderColor = ''; nameEl.style.background = ''; }
    return;
  }

  // Loader
  if (valEl) valEl.innerHTML = `<span style="font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
    <span class="spinner" style="width:12px;height:12px;border-width:2px"></span> Buscando asesor…</span>`;

  setTimeout(() => {
    const nombre = ASESORES_MOCK[code];
    if (nombre) {
      asesorValidado = true;
      if (nameEl) { nameEl.value = nombre; nameEl.style.borderColor = 'var(--success)'; nameEl.style.background = 'var(--success-bg)'; }
      if (codeEl) { codeEl.style.borderColor = 'var(--success)'; }

      if (nameEl) { nameEl.value = ''; nameEl.style.borderColor = 'var(--error)'; nameEl.style.background = 'var(--error-bg, #fff5f5)'; }
      if (codeEl) { codeEl.style.borderColor = 'var(--error)'; }

function useResend(channel, btn) {
  resendUsed[channel] = true;
  // Mostrar tag "Enviado"
  const tag = document.getElementById('tag-' + channel);
  if (tag) tag.style.display = 'inline-block';
  // Deshabilitar el botón usado
  btn.style.opacity = '.6';
  btn.style.cursor = 'default';
  btn.onclick = null;
  // Si ya se usaron SMS y Llamada, habilitar WhatsApp
  if (resendUsed.sms && resendUsed.llamada) {
    const waBtn = document.getElementById('btn-whatsapp');
    if (waBtn && !resendUsed.whatsapp) {
      waBtn.disabled = false;
      waBtn.style.opacity = '1';
      waBtn.style.cursor = 'pointer';
      const hint = document.getElementById('wa-hint');
      if (hint) hint.style.display = 'none';
    }
  }
}

function triggerLoaders() {
  [5,6,12].forEach(step => {
    if (currentStep !== step) return;
    const loader = document.getElementById('loader'+step);
    const result = document.getElementById('result'+step);
    if (loader && result) {
      loader.style.display = 'block';
      result.style.display = 'none';
      setTimeout(() => { loader.style.display='none'; result.style.display='block'; }, 1500);
    }
  });
}

function toggleSidebar() {
  document.body.classList.toggle('sidebar-hidden');
}

function selectScenario(i) {
  currentScenario = i;
  currentStep = 1;
  step3Phase = 0; step3Method = ''; step3Capture = 0;
  step4Phase = 0;
  resendUsed = { sms:false, llamada:false, whatsapp:false };
  validacionState = { celular: null, correo: null };
  asesorValidado = true;
  step7Phase = 0; if (step7Timer) { clearInterval(step7Timer); step7Timer = null; }
  step8Phase = 0; if (step8Timer) { clearInterval(step8Timer); step8Timer = null; }
  step13Phase = 0;
  // Update the current study tab's scenario
  if (activeView !== 'home') {
    const study = STUDIES.find(s => s.id === activeView);
    if (study) { study.scenarioIdx = i; study.currentStep = 1; }
  }
  renderStudyView();
  renderTabBar();
}

function resetStepPhases() {
  step3Phase = 0; step3Method = ''; step3Capture = 0;
  step4Phase = 0;
  step7Phase = 0; if (step7Timer) { clearInterval(step7Timer); step7Timer = null; }
  step8Phase = 0; if (step8Timer) { clearInterval(step8Timer); step8Timer = null; }
  step10Phase = 0; step10Method = '';
  step13Phase = 0;
}

function nextStep() {
  const sc = SCENARIOS[currentScenario];
  if (currentStep < sc.stopAt) {
    currentStep++;
    resetStepPhases();
    if (activeView !== 'home') {
      const study = STUDIES.find(s => s.id === activeView);
      if (study) study.currentStep = currentStep;
    }
    renderStudyView();
    renderTabBar();
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    resetStepPhases();
    if (activeView !== 'home') {
      const study = STUDIES.find(s => s.id === activeView);
      if (study) study.currentStep = currentStep;
    }
    renderStudyView();
    renderTabBar();
  }
}

function goToStep(step) {
  const sc = SCENARIOS[currentScenario];
  if (step >= 1 && step <= sc.stopAt) {
    currentStep = step;
    resetStepPhases();
    if (activeView !== 'home') {
      const study = STUDIES.find(s => s.id === activeView);
      if (study) study.currentStep = currentStep;
    }
    renderStudyView();
    renderTabBar();
  }
}

function updateNav() {
  const sc = SCENARIOS[currentScenario];
  document.getElementById('btn-prev').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
  document.getElementById('btn-next').style.visibility = currentStep >= sc.stopAt ? 'hidden' : 'visible';
  document.getElementById('nav-info').textContent = `Paso ${currentStep} de ${sc.stopAt} · Escenario ${sc.id}: ${sc.title}`;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (activeView === 'home') return;
  if (e.key === 'ArrowRight') nextStep();
  if (e.key === 'ArrowLeft') prevStep();
  if (e.key === 'Escape') showHome();
});

// Drag-to-scroll para stepper
function initDragScroll(selector) {
  document.addEventListener('mousedown', (e) => {
    const el = e.target.closest(selector);
    if (!el) return;
    let isDown = true, startX = e.pageX, scrollLeft = el.scrollLeft, moved = false;
    el.classList.add('dragging');
    const onMove = (e2) => {
      if (!isDown) return;
      const dx = e2.pageX - startX;
      if (Math.abs(dx) > 3) moved = true;
      el.scrollLeft = scrollLeft - dx;
    };
    const onUp = () => {
      isDown = false;
      el.classList.remove('dragging');
      if (moved) setTimeout(() => { moved = false; }, 0);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
initDragScroll('.stepper-container');
